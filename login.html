<input class="w-full h-full bg-transparent border-none outline-none pl-4 text-on-surface text-base font-body placeholder:text-outline-variant focus:ring-0" id="phone" placeholder="Mobile Number" type="tel"/>
</div>
</div>
<div class="text-label-md font-label text-on-surface-variant leading-relaxed mt-4 flex items-start group">
<label class="flex items-start cursor-pointer relative">
<input class="peer sr-only" type="checkbox"/>
<div class="w-4 h-4 rounded-sm bg-white border border-gray-400 peer-checked:bg-white peer-checked:border-black transition-colors flex items-center justify-center mt-0.5 shadow-sm text-transparent peer-checked:text-black">
<span class="material-symbols-outlined text-[12px]" data-icon="check" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check</span>
