<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>

<style>

:root{
    --primary:#00ff9c;
    --primary-hover:#00cc7a;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Consolas, monospace;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:url("https://images.unsplash.com/photo-1518770660439-4636190af475") no-repeat center/cover;
    position:relative;
}

/* Blur overlay */

body::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.75);
    backdrop-filter:blur(6px);
}

/* Signup Box */

.signup-box{
    position:relative;
    background:rgba(0,0,0,0.6);
    padding:35px;
    width:90%;
    max-width:380px;
    border-radius:12px;
    backdrop-filter:blur(12px);
    box-shadow:0 0 20px rgba(0,255,156,0.4);
    color:#00ff9c;
}

.signup-box h2{
    text-align:center;
    margin-bottom:20px;
    text-shadow:0 0 10px #00ff9c;
}

.input-box{
    margin-bottom:15px;
}

.input-box label{
    font-size:14px;
}

.input-box input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:none;
    border-radius:5px;
    background:#111;
    color:#00ff9c;
    outline:none;
}

.input-box input:focus{
    box-shadow:0 0 8px #00ff9c;
}

/* Button */

.signup-btn{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:5px;
    background:var(--primary);
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.signup-btn:hover{
    background:var(--primary-hover);
    box-shadow:0 0 12px #00ff9c;
}

.links{
    margin-top:15px;
    font-size:14px;
    text-align:center;
}

.links a{
    text-decoration:none;
    color:#00ff9c;
}

.links a:hover{
    text-shadow:0 0 8px #00ff9c;
}

</style>
</head>

<body>

<div class="signup-box">

<h2>Create Account</h2>

<form>

<div class="input-box">
<label>Full Name</label>
<input type="text" placeholder="Enter your name" required>
</div>

<div class="input-box">
<label>Email</label>
<input type="email" placeholder="Enter your email" required>
</div>

<div class="input-box">
<label>Password</label>
<input type="password" placeholder="Create password" required>
</div>

<div class="input-box">
<label>Confirm Password</label>
<input type="password" placeholder="Confirm password" required>
</div>

<button type="submit" class="signup-btn">Create Account</button>

<div class="links">
<p>Already have an account? <a href="login.html">Login</a></p>
</div>

</form>

</div>

</body>
</html>
