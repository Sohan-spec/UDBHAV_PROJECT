{%extends "master.html"%}
{%block title%}
Admin Dashboard
{%endblock%}

{% block body_class %}dark-theme{% endblock %}

{%block content%}
<main class="page">
	<section class="section-header-main">
		<h1>Admin Dashboard</h1>
	</section>

	<div class="product-grid" style="max-width:640px;">
		<article class="product-card"><div class="product-card-body"><div class="product-card-category">Orders</div><h3 id="orders-count">-</h3></div></article>
		<article class="product-card"><div class="product-card-body"><div class="product-card-category">Users</div><h3 id="users-count">-</h3></div></article>
	</div>

	<div class="summary-card" style="margin-top:16px;max-width:460px;">
		<h3>Add Product</h3>
		<form id="add-product-form" style="display:grid;gap:8px;margin-top:8px;">
			<input id="product-name" placeholder="Product name" required>
			<input id="product-price" type="number" step="0.01" placeholder="Price" required>
			<input id="product-stock" type="number" placeholder="Stock" value="0">
			<button class="btn-primary" type="submit">Create Product</button>
		</form>
	</div>

	<div class="summary-card" style="margin-top:16px;max-width:760px;">
		<h3>Orders Table Layout</h3>
		<table border="1" cellpadding="8" cellspacing="0" style="border-collapse:collapse;width:100%;margin-top:8px;">
			<thead>
				<tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th></tr>
			</thead>
			<tbody>
				<tr><td colspan="5">Layout ready</td></tr>
			</tbody>
		</table>
	</div>

	<p id="admin-msg" class="muted" style="margin-top:10px;"></p>
</main>

<script>
const adminToken = localStorage.getItem("token");

async function loadAdminStats() {
	const msg = document.getElementById("admin-msg");
	msg.textContent = "";
	if (!adminToken) {
		msg.textContent = "Admin token required.";
		return;
	}

	try {
		const res = await fetch("/api/admin/stats/", {
			headers: { "Authorization": "Bearer " + adminToken }
		});
		const data = await res.json();
		if (!res.ok) {
			msg.textContent = data.error || "Failed to fetch stats";
			return;
		}
		document.getElementById("orders-count").textContent = data.orders_count ?? 0;
		document.getElementById("users-count").textContent = data.users_count ?? 0;
	} catch (e) {
		msg.textContent = "Request failed";
	}
}

document.getElementById("add-product-form").addEventListener("submit", async function (e) {
	e.preventDefault();
	const msg = document.getElementById("admin-msg");
	msg.textContent = "";

	if (!adminToken) {
		msg.textContent = "Admin token required.";
		return;
	}

	const payload = {
		name: document.getElementById("product-name").value.trim(),
		price: document.getElementById("product-price").value,
		stock: Number(document.getElementById("product-stock").value || 0)
	};

	try {
		const res = await fetch("/api/products/create/", {
			method: "POST",
			headers: {
				"Content-Type": "application/json",
				"Authorization": "Bearer " + adminToken
			},
			body: JSON.stringify(payload)
		});
		const data = await res.json();
		if (!res.ok) {
			msg.textContent = data.error || "Create product failed";
			return;
		}
		msg.textContent = "Product created. ID: " + data.id;
		document.getElementById("add-product-form").reset();
	} catch (e) {
		msg.textContent = "Request failed";
	}
});

loadAdminStats();
</script>
{%endblock%}
